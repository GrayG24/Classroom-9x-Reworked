<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🚀</text></svg>">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Classroom 9x Games</title>
  </head>
  <body id="app-body" data-theme="cyan" class="custom-cursor-enabled">
    <div id="root"></div>
    
    <!-- Custom Cursor Elements -->
    <div class="glow-cursor" id="cursor"></div>
    <div class="glow-cursor-follower" id="cursor-follower"></div>
    
    <script>
      const cursor = document.getElementById('cursor');
      const follower = document.getElementById('cursor-follower');
      
      let mouseX = -100;
      let mouseY = -100;
      let followerX = -100;
      let followerY = -100;

      document.addEventListener('mousemove', (e) => {
        mouseX = e.clientX;
        mouseY = e.clientY;
        
        cursor.style.left = mouseX + 'px';
        cursor.style.top = mouseY + 'px';

        const target = e.target;
        const isHoverable = target.closest('button, a, [role="button"], .cursor-pointer');
        if (isHoverable) {
          cursor.classList.add('hovering');
          follower.classList.add('hovering');
        } else {
          cursor.classList.remove('hovering');
          follower.classList.remove('hovering');
        }
      });

      const animateFollower = () => {
        const dx = mouseX - followerX;
        const dy = mouseY - followerY;
        
        followerX += dx * 0.15;
        followerY += dy * 0.15;
        
        follower.style.left = followerX + 'px';
        follower.style.top = followerY + 'px';
        
        requestAnimationFrame(animateFollower);
      };
      animateFollower();

      document.addEventListener('mousedown', () => {
        cursor.classList.add('active');
        follower.classList.add('active');
      });
      document.addEventListener('mouseup', () => {
        cursor.classList.remove('active');
        follower.classList.remove('active');
      });

      document.addEventListener('mouseleave', () => {
        cursor.style.opacity = '0';
        follower.style.opacity = '0';
      });

      document.addEventListener('mouseenter', () => {
        cursor.style.opacity = '1';
        follower.style.opacity = '1';
      });
    </script>
    <script type="module" src="/src/main.tsx?v=1"></script>
  </body>
</html>
